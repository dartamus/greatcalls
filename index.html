<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BigID — What Great Looks Like</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Arial',sans-serif;background:#F5F5F0;color:#1C1C1C;-webkit-text-size-adjust:100%}

/* ── HEADER ── */
.header{background:#0D0D1A;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100}
.logo img{height:24px;width:auto;display:block}
.header-right{font-size:12px;color:rgba(255,255,255,0.45);white-space:nowrap}

/* ── HERO ── */
.hero{background:#0D0D1A;padding:2rem 1.5rem 1.75rem;position:relative;overflow:hidden;border-bottom:1px solid rgba(255,255,255,0.06)}
.hero-accent{position:absolute;top:-60px;right:-60px;width:280px;height:280px;border-radius:50%;background:rgba(232,62,140,0.07);pointer-events:none}
.hero-accent2{position:absolute;bottom:-80px;left:30%;width:180px;height:180px;border-radius:50%;background:rgba(130,80,255,0.06);pointer-events:none}
.hero-tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#E83E8C;margin-bottom:10px;border:1px solid rgba(232,62,140,0.3);padding:3px 10px;border-radius:20px}
.hero h1{font-size:26px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:8px}
.hero h1 span{color:#E83E8C}
.hero p{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6;max-width:540px}
.hero-stats{display:flex;gap:20px;margin-top:1.25rem;flex-wrap:wrap}
.hero-stat .n{font-size:22px;font-weight:700;color:#fff}
.hero-stat .l{font-size:11px;color:rgba(255,255,255,0.4);margin-top:1px}
.hero-divider{width:1px;background:rgba(255,255,255,0.1);align-self:stretch}

/* ── CATALOG ── */
.catalog-area{padding:1.5rem;max-width:1400px;margin:0 auto}

/* ── SKILL NAV — desktop: 6 columns, tablet: 3x2, mobile: 2x3 ── */
.skill-nav{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:1.75rem}

.skill-btn{border-radius:12px;padding:14px 8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;line-height:1.2;border:2.5px solid transparent;-webkit-tap-highlight-color:transparent}
.skill-btn.t-trust       {border-color:#E83E8C;color:#A01F5A;background:#fff9fc}
.skill-btn.t-discovery   {border-color:#1D9E75;color:#085041;background:#f7fdfa}
.skill-btn.t-storytelling{border-color:#E8823E;color:#8C3E10;background:#fff9f5}
.skill-btn.t-positioning {border-color:#5C54E8;color:#2B258C;background:#f8f8ff}
.skill-btn.t-relational  {border-color:#8250E8;color:#4A238C;background:#faf7ff}
.skill-btn.t-closing     {border-color:#2D8CE8;color:#0C4A8C;background:#f5f9ff}
.skill-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,0.08)}
.skill-btn.t-trust.active       {background:#FDE8F2}
.skill-btn.t-discovery.active   {background:#E1F5EE}
.skill-btn.t-storytelling.active{background:#FFF0E6}
.skill-btn.t-positioning.active {background:#EEF0FE}
.skill-btn.t-relational.active  {background:#F3EEFE}
.skill-btn.t-closing.active     {background:#E6F4FF}
.skill-btn.active{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.1);border-width:3px}
.skill-btn .skill-label{font-size:12px;font-weight:700}
.skill-btn .count{font-size:10px;font-weight:400;opacity:0.65}

/* ── PROMPT ── */
.prompt{text-align:center;padding:3rem 1rem;color:#aaa;font-size:14px}
.prompt .arrow{font-size:26px;margin-bottom:10px;opacity:0.4}

/* ── CARD GRID — desktop: 3-4 col, tablet: 2 col, mobile: 1 col ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;transition:border-color 0.15s,transform 0.15s;animation:fadeUp 0.2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:hover{border-color:#ccc;transform:translateY(-2px)}

.video-slot{width:100%;aspect-ratio:16/9;background:#0D0D1A;display:flex;align-items:center;justify-content:center}
.video-slot video{width:100%;height:100%;object-fit:cover;display:block}

.card-body{padding:13px 15px 15px}
.ctx-tag{display:inline-block;font-size:10px;color:#888;background:#f5f5f5;padding:3px 8px;border-radius:10px;margin-bottom:8px}
.card h4{font-size:14px;font-weight:700;color:#1C1C1C;margin-bottom:5px;line-height:1.35}
.card p{font-size:13px;color:#555;line-height:1.55}

/* ── FOOTER ── */
.footer-bar{background:#0D0D1A;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.06);margin-top:2rem;flex-wrap:wrap;gap:8px}
.footer-left{display:flex;align-items:center;gap:14px}
.footer-logo img{height:20px;width:auto;display:block}
.footer-copy{font-size:11px;color:rgba(255,255,255,0.25)}

/* ── TABLET (max 1024px) ── */
@media (max-width:1024px){
.skill-nav{grid-template-columns:repeat(3,1fr)}
.grid{grid-template-columns:repeat(2,1fr)}
.hero h1{font-size:24px}
}

/* ── MOBILE (max 640px) ── */
@media (max-width:640px){
.header{padding:0 1rem;height:48px}
.logo img{height:20px}
.header-right{font-size:11px}

.hero{padding:1.5rem 1rem 1.25rem}
.hero h1{font-size:22px}
.hero p{font-size:13px}
.hero-stats{gap:14px}
.hero-stat .n{font-size:20px}
.hero-stat .l{font-size:10px}

.catalog-area{padding:1rem}

.skill-nav{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1.25rem}
.skill-btn{padding:12px 6px;border-radius:10px}
.skill-btn .skill-label{font-size:12px}
.skill-btn .count{font-size:10px}

.grid{grid-template-columns:1fr;gap:12px}

.card{border-radius:10px}
.card-body{padding:12px 13px 14px}
.card h4{font-size:14px}
.card p{font-size:13px}

.footer-bar{padding:0.875rem 1rem;flex-direction:column;align-items:flex-start;gap:6px}
.footer-logo img{height:18px}
.footer-copy{font-size:10px}

.prompt{padding:2rem 1rem}
}

/* ── TOUCH — remove hover effects on touch devices ── */
@media (hover:none){
.skill-btn:hover{transform:none;box-shadow:none}
.card:hover{transform:none;border-color:#e8e8e8}
.skill-btn.active{transform:none}
}
</style>

</head>

<script>
var BASE="https://raw.githubusercontent.com/dartamus/greatcalls/main/";
var active=null;
var skills=[
  {tag:"trust",        label:"Trust-building"},
  {tag:"discovery",    label:"Discovery"},
  {tag:"storytelling", label:"Storytelling"},
  {tag:"positioning",  label:"Positioning"},
  {tag:"relational",   label:"Relational"},
  {tag:"closing",      label:"Closing"}
];
var data=[
  {tag:"trust",        ctx:"Enterprise · AI risk",         title:"'What we heard' — gold standard opener",              body:"Opens with a slide mirroring back exactly what was learned in discovery: AI Data Risk feeding LLMs with unredacted PII/PHI, no real-time controls across UK&I, AI POCs stalled. The prospect's first reaction is always recognition.",clip:BASE+"clip_01_what_we_heard_opener.mp4"},
  {tag:"trust",        ctx:"Food & Bev · data governance",  title:"'My understanding of your needs' slide",              body:"A custom slide per prospect showing exactly what was researched before the call. The message lands before a word is spoken: I invested in you before asking for your time.",clip:BASE+"clip_02_my_understanding_of_your_needs.mp4"},
  {tag:"trust",        ctx:"AI governance",                 title:"Pre-emptive honesty on product scope",                body:"Before closing, a product limitation is volunteered unprompted. Disarms skepticism and signals long-term partnership intent. Rare in sales — and it works. The prospect's tone warms noticeably.",clip:BASE+"clip_03_preemptive_honesty.mp4"},
  {tag:"trust",        ctx:"Enterprise · AI risk",         title:"Agenda transparency from the start",                  body:"Opens by sharing the agenda, then asks 'does this match what you hoped to cover today?' Giving control before taking it — this small act consistently accelerates trust in the first five minutes.",clip:BASE+"clip_04_agenda_transparency.mp4"},
  {tag:"trust",        ctx:"Healthcare · Sage",             title:"Social proof landed naturally",                       body:"Weaves in '20% of the F100 are customers' not as a boast but as a 'you're in good company' signal. Paired with RSAC and Deloitte credentials. Layered legitimacy, zero bragging.",clip:BASE+"clip_05_social_proof_naturally.mp4"},
  {tag:"discovery",    ctx:"AI governance",                 title:"The layered 'why now' probe",                         body:"When compliance comes up: 'what's driving urgency on that specifically?' — then 'who else feels that pressure?' Two questions surface budget owner, timeline, and political landscape in one exchange.",clip:BASE+"clip_06_layered_why_now_probe.mp4"},
  {tag:"discovery",    ctx:"AI governance",                 title:"Silence after the demo",                              body:"After the platform walkthrough — stop. Don't explain. Don't fill air. Wait. What comes back reveals the prospect's real priority — something no question alone could have surfaced.",clip:BASE+"clip_07_silence_after_demo.mp4"},
  {tag:"discovery",    ctx:"Food & Bev",                    title:"Confirming the needs slide before advancing",         body:"Shows the custom slide then pauses: 'Before I go further, is this accurate? What did I miss?' Validates research, invites participation, surfaces new priorities. One question doing three jobs.",clip:BASE+"clip_08_confirming_needs_slide.mp4"},
  {tag:"discovery",    ctx:"Enterprise · AI risk",         title:"Who else needs to be in the room",                  body:"After confirming alignment, asks who else has a stake — by name if possible. Maps the buying committee live, building a stakeholder picture most reps only discover after losing the deal.",clip:BASE+"clip_09_who_else_in_room.mp4"},
  {tag:"discovery",    ctx:"Healthcare · Sage",             title:"What would make this a success for you personally", body:"Midway through: 'If we do this right, what does success look like for you personally — not just the project?' Reframes from vendor/buyer to shared outcome partners.",clip:BASE+"clip_10_what_would_success_look_like.mp4"},
  {tag:"discovery",    ctx:"AI governance",                 title:"Industry-specific framing from minute one",           body:"Opens with industry context before the prospect has said much — signaling research was done. The prospect immediately engages rather than deflecting. Earned credibility, before a single slide.",clip:BASE+"clip_11_industry_framing_first_minute.mp4"},
  {tag:"discovery",    ctx:"Enterprise · AI risk",         title:"Referencing a prior touchpoint by name",              body:"Mentions a specific pain point from the first call — by name, without visible notes. Signals the account has been thought about between calls. The prospect visibly relaxes.",clip:BASE+"clip_12_referencing_prior_touchpoint.mp4"},
  {tag:"relational",   ctx:"AI governance",                 title:"The tone-setting opening pause",                      body:"Opens with a genuine question about the prospect's week — then waits 3 seconds. That pause shifts the dynamic from pitch to conversation before the agenda is even shared.",clip:BASE+"clip_13_tone_setting_opening_pause.mp4"},
  {tag:"relational",   ctx:"Healthcare · Sage",             title:"Naming every participant directly",                   body:"When a second stakeholder joins, they're addressed by name within the first minute, their role asked about, framing adjusted. Everyone feels like the primary audience.",clip:BASE+"clip_14_naming_every_participant.mp4"},
  {tag:"relational",   ctx:"AI governance",                 title:"Matching prospect energy mid-call",                   body:"When the prospect's tone shifts from cautious to curious, pace quickens and framing becomes collaborative. Reading the room and adjusting — not a technique, a behavior.",clip:BASE+"clip_15_matching_prospect_energy.mp4"},
  {tag:"relational",   ctx:"AI governance",                 title:"Acknowledging uncertainty without rushing past it",   body:"When a prospect expresses internal uncertainty: 'that's actually really common right now' — then a pause. Validates before pivoting. The prospect feels heard, not handled.",clip:BASE+"clip_16_acknowledging_uncertainty.mp4"},
  {tag:"relational",   ctx:"Enterprise · AI risk",         title:"Forward-leaning body language through the screen",    body:"Consistently leans slightly toward camera when the prospect speaks. Subtle physical cue signaling full attention on video. Combined with minimal interruption, makes prospects feel genuinely listened to.",clip:BASE+"clip_17_forward_leaning_body_language.mp4"},
  {tag:"relational",   ctx:"Healthcare · Sage",             title:"The brief personal moment before business",           body:"Before the agenda, acknowledges something from a prior email — a quick genuine callback. Signals: I read what you send me. Small moment, outsized trust signal.",clip:BASE+"clip_18_personal_moment_before_business.mp4"},
  {tag:"relational",   ctx:"Enterprise · AI risk",         title:"Naming the hard thing the prospect hasn't said yet",  body:"Surfaces an unspoken tension — budget timing vs. urgency — before the prospect raises it. Removes the elephant without embarrassing anyone.",clip:BASE+"clip_19_naming_hard_thing.mp4"},
  {tag:"storytelling", ctx:"AI governance",                 title:"Virtual background as a living visual anchor",        body:"The BigID NEXT chalkboard background acts as a living slide — gesturing toward concepts naturally as they arise. Not reading a deck; the deck is reading the room.",clip:BASE+"clip_20_virtual_background_visual_anchor.mp4"},
  {tag:"storytelling", ctx:"Enterprise · AI risk",         title:"Business-Critical Blocker framing",                   body:"'Without a solution, AI initiatives remain stalled in POC.' Said aloud, then a pause. The prospect fills the silence with their own fear. Creates conditions for them to sell themselves.",clip:BASE+"clip_21_business_critical_blocker.mp4"},
  {tag:"storytelling", ctx:"Food & Bev",                    title:"Find → Understand → Manage as narrative spine",  body:"Each platform stage mapped to a pain the prospect already named. The architecture feels designed for them, not shown to them. A solution narrative, not a product tour.",clip:BASE+"clip_22_find_understand_manage_narrative.mp4"},
  {tag:"storytelling", ctx:"Enterprise · AI risk",         title:"Live deck editing as co-creation",                    body:"Edits the App Framework slide in real time while the prospect asks about integrations. The live annotation makes the prospect feel like they're building something together, not watching a demo.",clip:BASE+"clip_23_live_deck_editing_cocreation.mp4"},
  {tag:"positioning",  ctx:"AI governance",                 title:"The AI governance pivot — crisp and jargon-free",    body:"When a prospect expresses AI uncertainty: 'You can't govern what you can't see.' Directly mapped to the prospect's exact words. One sentence does the work of a slide.",clip:BASE+"clip_24_ai_governance_pivot.mp4"},
  {tag:"positioning",  ctx:"Enterprise · AI risk",         title:"Competitive wedge without naming competitors",         body:"'Most tools only see one layer. We connect all four.' Describes the gap point solutions leave and lets the prospect fill in the blank. No competitor named. No defensiveness.",clip:BASE+"clip_25_competitive_wedge_no_names.mp4"},
  {tag:"positioning",  ctx:"AI governance",                 title:"The BigID difference without jargon",                 body:"Explains the layered platform in plain terms tied to outcomes the prospect named. Total data coverage → AI identification → risk analysis → action. Clarity is the flex.",clip:BASE+"clip_26_bigid_difference_no_jargon.mp4"},
  {tag:"positioning",  ctx:"Healthcare · Sage",             title:"Regulatory framing matched to prospect's north star", body:"Tailors the value prop to NIST CSF alignment — the exact regulatory framework the prospect named as their goal. Specificity signals mastery and removes the need to justify relevance.",clip:BASE+"clip_27_regulatory_framing_nist.mp4"},
  {tag:"positioning",  ctx:"Enterprise · AI risk",         title:"Outcome language before architecture",                 body:"Introduces the platform as 'guardrails that let your AI POCs move to production' — a business outcome — before showing any architecture. Features become evidence, not the pitch.",clip:BASE+"clip_28_outcome_language_before_architecture.mp4"},
  {tag:"closing",      ctx:"AI governance",                 title:"Owning the next step confidently",                    body:"Doesn't ask 'does that work for you?' — says 'let's get a technical call on Thursday — morning or afternoon?' Specific, time-boxed, assumes momentum.",clip:BASE+"clip_29_owning_next_step_confidently.mp4"},
  {tag:"closing",      ctx:"Healthcare · Sage",             title:"Next steps with named owners",                        body:"Closes by walking through a Next Steps slide — specific deliverables, named owners, realistic timeframes. Doesn't ask if they're interested. Asks which owner should receive the follow-up.",clip:BASE+"clip_30_next_steps_named_owners.mp4"},
  {tag:"closing",      ctx:"Enterprise · AI risk",         title:"How do we proceed instead of are you interested",     body:"Proposes forward motion and asks for refinement — not permission. The posture says 'when we work together,' not 'if.' Entirely different energy.",clip:BASE+"clip_31_how_do_we_proceed_close.mp4"}
];

var counts={};
data.forEach(function(m){counts[m.tag]=(counts[m.tag]||0)+1;});

var nav=document.getElementById("skill-nav");
skills.forEach(function(s){
  var btn=document.createElement("button");
  btn.className="skill-btn t-"+s.tag;
  btn.innerHTML='<span class="skill-label">'+s.label+'</span><span class="count">'+counts[s.tag]+' clips</span>';
  btn.onclick=function(){select(s.tag,btn);};
  nav.appendChild(btn);
});

function select(tag,btn){
  if(active===tag){
    active=null;
    document.querySelectorAll(".skill-btn").forEach(function(b){b.classList.remove("active");});
    render();return;
  }
  active=tag;
  document.querySelectorAll(".skill-btn").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  render();
  // On mobile, scroll down to cards smoothly
  if(window.innerWidth<=640){
    setTimeout(function(){
      document.getElementById("catalog-body").scrollIntoView({behavior:"smooth",block:"start"});
    },50);
  }
}

function render(){
  var body=document.getElementById("catalog-body");
  if(!active){
    body.innerHTML='<div class="prompt"><div class="arrow">↑</div><p>Choose a skill above to explore clips</p></div>';
    return;
  }
  var f=data.filter(function(m){return m.tag===active;});
  body.innerHTML='<div class="grid">'+f.map(function(m,i){
    return '<div class="card" style="animation-delay:'+( i*0.04)+'s">'+
      '<div class="video-slot"><video src="'+m.clip+'" controls preload="none" playsinline style="width:100%;height:100%;object-fit:cover;display:block"></video></div>'+
      '<div class="card-body">'+
      '<span class="ctx-tag">'+m.ctx+'</span>'+
      '<h4>'+m.title+'</h4>'+
      '<p>'+m.body+'</p>'+
      '</div></div>';
  }).join("")+'</div>';
}

render();
</script>
